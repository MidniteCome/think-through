<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="'SF Mono', 'Menlo', 'Monaco', monospace" font-size="13">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ateal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#3dd6c8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="920" fill="url(#abg)" rx="12"/>

  <!-- Terminal chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#21262d" rx="12"/>
  <rect x="0" y="12" width="800" height="24" fill="#21262d"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="22" fill="#8b949e" text-anchor="middle" font-size="12">claude ~ building a real-time dashboard</text>

  <!-- Context: existing vibe coding conversation -->
  <text x="30" y="65" fill="#484f58" font-size="11">... building the real-time dashboard component ...</text>

  <!-- User message -->
  <rect x="30" y="82" width="740" height="60" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="98" fill="#7ee787" font-size="11" font-weight="bold">You</text>
  <text x="45" y="116" fill="#e6edf3" font-size="13">Wait — should we use WebSocket, SSE, or polling here?</text>
  <text x="45" y="132" fill="#e6edf3" font-size="13">/think-through assist</text>

  <!-- Assist mode badge -->
  <rect x="30" y="158" width="140" height="22" fill="#2ec4b6" rx="4" opacity="0.15"/>
  <text x="42" y="173" fill="#2ec4b6" font-size="11" font-weight="bold">ASSIST MODE</text>
  <text x="180" y="173" fill="#484f58" font-size="11">2-3 exchanges, then back to work</text>

  <!-- Round 1: Anchor + Evidence -->
  <rect x="30" y="192" width="740" height="130" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="215" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="219" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="219" fill="#e6edf3" font-size="13">Let me anchor this. Your dashboard shows:</text>
  <text x="75" y="239" fill="#c9d1d9" font-size="12">- 50 concurrent users max, data updates every 5-30s</text>
  <text x="75" y="259" fill="#c9d1d9" font-size="12">- Vercel deployment (serverless — persistent connections are $$)</text>
  <text x="75" y="285" fill="#e6edf3" font-size="13">What's the actual requirement — low latency or low cost?</text>

  <rect x="75" y="298" width="200" height="18" fill="#21262d" rx="3" stroke="#2ec4b6" stroke-width="1"/>
  <text x="85" y="311" fill="#2ec4b6" font-size="10">A) Sub-second freshness</text>
  <rect x="285" y="298" width="200" height="18" fill="#21262d" rx="3" stroke="#30363d" stroke-width="1"/>
  <text x="295" y="311" fill="#c9d1d9" font-size="10">B) Good enough, keep costs low</text>

  <!-- Round 2: Bridge + Stress test -->
  <rect x="30" y="336" width="740" height="148" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="359" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="363" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="363" fill="#e6edf3" font-size="13">"Good enough + low cost" on Vercel serverless. Here's the bridge:</text>
  <text x="75" y="389" fill="#c9d1d9" font-size="12">SSE needs long-lived connections. On Vercel, that means Edge</text>
  <text x="75" y="409" fill="#c9d1d9" font-size="12">Runtime + streaming — doable but adds infra complexity.</text>
  <text x="75" y="435" fill="#f47067" font-size="12" font-weight="bold">Pre-mortem:</text>
  <text x="165" y="435" fill="#c9d1d9" font-size="12">If you pick polling and later need sub-second,</text>
  <text x="75" y="455" fill="#c9d1d9" font-size="12">is the migration path painful? (Spoiler: SWR to SSE is a clean swap.)</text>
  <text x="75" y="475" fill="#8b949e" font-size="11" font-style="italic">How confident that "good enough" won't become "too slow" within 3 months?</text>

  <!-- ════ Output card ════ -->
  <rect x="30" y="500" width="740" height="310" fill="#1c2128" rx="8" stroke="#2ec4b6" stroke-width="1.5"/>

  <text x="50" y="528" fill="#e6edf3" font-size="14" font-weight="bold">Think-Through: Real-time Strategy</text>
  <line x1="50" y1="538" x2="750" y2="538" stroke="#30363d" stroke-width="1"/>

  <text x="50" y="560" fill="#2ec4b6" font-size="12" font-weight="bold">Claim:</text>
  <text x="108" y="560" fill="#c9d1d9" font-size="12">Use SWR polling (10s interval) for the dashboard MVP.</text>

  <text x="50" y="585" fill="#f0883e" font-size="12" font-weight="bold">Evidence:</text>
  <text x="125" y="585" fill="#c9d1d9" font-size="12">50 users, 5-30s data, Vercel serverless, cost-sensitive.</text>

  <text x="50" y="610" fill="#a78bfa" font-size="12" font-weight="bold">Warrant:</text>
  <text x="120" y="610" fill="#c9d1d9" font-size="12">When update freq > network round-trip, polling is simpler</text>
  <text x="120" y="627" fill="#c9d1d9" font-size="12">and cheaper than maintaining persistent connections.</text>

  <text x="50" y="652" fill="#f47067" font-size="12" font-weight="bold">Risk:</text>
  <text x="95" y="652" fill="#c9d1d9" font-size="12">If real-time requirement tightens, SWR-to-SSE migration</text>
  <text x="95" y="669" fill="#c9d1d9" font-size="12">is clean (swap fetcher). WebSocket would be harder to add later.</text>

  <text x="50" y="694" fill="#7ee787" font-size="12" font-weight="bold">Verdict:</text>
  <text x="115" y="694" fill="#e6edf3" font-size="12">SWR polling</text>
  <text x="210" y="694" fill="#8b949e" font-size="12">(confidence: 85%)</text>

  <text x="50" y="719" fill="#8b949e" font-size="12" font-weight="bold">Holds unless:</text>
  <text x="160" y="719" fill="#c9d1d9" font-size="12">user count 10x or latency SLA drops below 2s.</text>

  <!-- Separator: output saved -->
  <line x1="50" y1="740" x2="750" y2="740" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="762" fill="#2ec4b6" font-size="11" font-weight="bold">Saved to .claude/think-through/realtime-strategy.md</text>
  <text x="50" y="780" fill="#484f58" font-size="11">Claude Code will reference this decision in future context.</text>
  <text x="50" y="798" fill="#484f58" font-size="11">Revisit with: /think-through revisit realtime-strategy</text>

  <!-- Back to normal coding -->
  <rect x="30" y="828" width="740" height="50" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="850" fill="#7ee787" font-size="12">Back to work. Implementing SWR polling...</text>
  <text x="50" y="868" fill="#484f58" font-size="11">useSWR('/api/dashboard', fetcher, { refreshInterval: 10000 })</text>

  <!-- Cursor -->
  <text x="30" y="905" fill="#7ee787" font-weight="bold">$</text>
  <text x="50" y="905" fill="#484f58">
    <animate attributeName="fill" values="#484f58;#e6edf3;#484f58" dur="1.2s" repeatCount="indefinite"/>|
  </text>
</svg>
