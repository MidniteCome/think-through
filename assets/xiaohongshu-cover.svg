<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
  </defs>

  <rect width="1080" height="1440" fill="#f8f8fc"/>
  <circle cx="540" cy="550" r="400" fill="#2ec4b6" opacity="0.06" filter="url(#blur1)"/>

  <!-- Main punchline -->
  <text x="540" y="340" fill="#1a1a2e" font-size="56" font-weight="800" text-anchor="middle">大多数人让 AI 替自己想</text>
  <text x="540" y="425" fill="#1a1a2e" font-size="56" font-weight="800" text-anchor="middle">我做了个杠精 AI</text>
  <text x="540" y="510" fill="#0d9488" font-size="56" font-weight="800" text-anchor="middle">逼我自己去想</text>

  <!-- Divider -->
  <line x1="420" y1="580" x2="660" y2="580" stroke="#d8d8e0" stroke-width="2"/>

  <!-- Quote -->
  <text x="540" y="670" fill="#555568" font-size="28" text-anchor="middle" font-style="italic">
    <tspan x="540" dy="0">"Figuring out what to ask</tspan>
    <tspan x="540" dy="46">is more important than the answer."</tspan>
  </text>

  <!-- Attribution -->
  <text x="540" y="800" fill="#777790" font-size="22" text-anchor="middle" font-weight="500">— Sam Altman</text>
  <text x="540" y="838" fill="#9999aa" font-size="18" text-anchor="middle">CEO, OpenAI · 2025 YC Startup School</text>

  <!-- WEF box -->
  <rect x="200" y="920" width="680" height="120" rx="16" fill="#ffffff" stroke="#d8d8e0" stroke-width="1.5"/>
  <text x="540" y="968" fill="#555568" font-size="20" text-anchor="middle" letter-spacing="2" font-weight="500">WORLD ECONOMIC FORUM · 2025</text>
  <text x="540" y="1012" fill="#1a1a2e" font-size="28" font-weight="700" text-anchor="middle">批判性思维 = 全球 #1 紧缺技能</text>

  <!-- Tagline -->
  <text x="540" y="1160" fill="#8888a0" font-size="22" text-anchor="middle">开源 Claude Code Skill · 5 阶段推理状态机</text>

  <!-- Bottom bar -->
  <rect x="0" y="1380" width="1080" height="60" fill="#f0f0f4"/>
  <text x="540" y="1418" fill="#8888a0" font-size="17" text-anchor="middle" font-family="'SF Mono', monospace" letter-spacing="1">github.com/Willdeepdive/think-through</text>
</svg>
