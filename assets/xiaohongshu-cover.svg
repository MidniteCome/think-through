<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#08090d"/>
      <stop offset="50%" style="stop-color:#0e1018"/>
      <stop offset="100%" style="stop-color:#0a0b10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#1a8a7f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2ec4b6;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1440" fill="url(#bg)"/>

  <!-- Ambient glow - top right -->
  <circle cx="850" cy="200" r="300" fill="#2ec4b6" opacity="0.04" filter="url(#blur1)"/>
  <!-- Ambient glow - bottom left -->
  <circle cx="200" cy="1200" r="250" fill="#2ec4b6" opacity="0.03" filter="url(#blur2)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#1a1d28" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="1080" x2="1080" y2="1080" stroke="#1a1d28" stroke-width="0.5" opacity="0.5"/>

  <!-- Top: decorative open-quote mark -->
  <text x="80" y="380" fill="#2ec4b6" opacity="0.12" font-size="320" font-family="Georgia, 'Noto Serif SC', serif" font-weight="700">"</text>

  <!-- Main quote -->
  <text x="100" y="540" fill="#e8e8f0" font-size="52" font-weight="700" letter-spacing="1">
    <tspan x="100" dy="0">搞清楚该问什么问题，</tspan>
    <tspan x="100" dy="80">会比搞清楚答案本身</tspan>
    <tspan x="100" dy="80">更重要。</tspan>
  </text>

  <!-- Attribution line -->
  <line x1="100" y1="780" x2="180" y2="780" stroke="url(#accent)" stroke-width="2"/>
  <text x="100" y="820" fill="#8888a0" font-size="24" letter-spacing="0.5">Sam Altman, OpenAI CEO</text>
  <text x="100" y="855" fill="#555568" font-size="18" letter-spacing="0.5">CNBC, January 2025</text>

  <!-- Divider -->
  <line x1="100" y1="920" x2="980" y2="920" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Bottom section: the punchline -->
  <text x="100" y="1000" fill="#555568" font-size="20" letter-spacing="2" font-weight="500">AI 时代的悖论</text>

  <text x="100" y="1070" fill="#c0c0d0" font-size="32" font-weight="500" line-height="1.6">
    <tspan x="100" dy="0">AI 越来越会答题，</tspan>
    <tspan x="100" dy="52">但出题这件事，它做不了。</tspan>
  </text>

  <text x="100" y="1210" fill="#8888a0" font-size="26" font-weight="400">
    <tspan x="100" dy="0">大多数人让 AI 替自己想。</tspan>
    <tspan x="100" dy="48">我做了个工具，让 AI 逼你想。</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="1380" width="1080" height="60" fill="#0c0d12"/>
  <text x="540" y="1418" fill="#555568" font-size="16" text-anchor="middle" letter-spacing="1.5" font-family="'SF Mono', 'Menlo', monospace">github.com/MidniteCome/think-through</text>

  <!-- Accent dot -->
  <circle cx="100" cy="1410" r="4" fill="#2ec4b6" opacity="0.6"/>
</svg>
