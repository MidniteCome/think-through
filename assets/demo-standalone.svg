<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1720" font-family="'SF Mono', 'Menlo', 'Monaco', monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#3dd6c8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1720" fill="url(#bg)" rx="12"/>

  <!-- Terminal chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#21262d" rx="12"/>
  <rect x="0" y="12" width="800" height="24" fill="#21262d"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="22" fill="#8b949e" text-anchor="middle" font-size="12">claude ~ think-through</text>

  <!-- User input -->
  <text x="30" y="65" fill="#7ee787" font-weight="bold">$</text>
  <text x="50" y="65" fill="#e6edf3">/think-through</text>

  <rect x="30" y="82" width="740" height="48" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="102" fill="#8b949e" font-size="11">Topic:</text>
  <text x="95" y="102" fill="#e6edf3" font-size="13">AI is making deep expertise obsolete — is it still</text>
  <text x="95" y="118" fill="#e6edf3" font-size="13">worth spending years mastering a single field?</text>

  <!-- ════ Stage 1: Anchoring ════ -->
  <rect x="30" y="150" width="740" height="28" fill="#1c2128" rx="6"/>
  <rect x="30" y="150" width="148" height="28" fill="#2ec4b6" rx="6" opacity="0.15"/>
  <text x="45" y="168" fill="#2ec4b6" font-size="12" font-weight="bold">[Stage 1/5: Anchoring]</text>
  <rect x="280" y="162" width="100" height="5" fill="#30363d" rx="3"/>
  <rect x="280" y="162" width="20" height="5" fill="#2ec4b6" rx="3"/>

  <rect x="30" y="190" width="740" height="175" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="213" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="217" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="217" fill="#e6edf3" font-size="13">"Deep expertise is obsolete" — this is too big. Let's pin it down.</text>
  <text x="75" y="243" fill="#c9d1d9" font-size="12">When you say "mastering a field," which scenario do you mean?</text>

  <rect x="75" y="262" width="320" height="26" fill="#21262d" rx="4" stroke="#2ec4b6" stroke-width="1"/>
  <text x="90" y="279" fill="#2ec4b6" font-size="11">A) Spend 10yr to become a world-class specialist</text>

  <rect x="75" y="296" width="320" height="26" fill="#21262d" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="313" fill="#c9d1d9" font-size="11">B) Go 3yr deep, enough to direct AI effectively</text>

  <rect x="75" y="330" width="320" height="26" fill="#21262d" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="347" fill="#c9d1d9" font-size="11">C) Stay broad — learn just enough of everything</text>

  <!-- ════ Stage 2: Evidence ════ -->
  <rect x="30" y="385" width="740" height="28" fill="#1c2128" rx="6"/>
  <rect x="30" y="385" width="296" height="28" fill="#f0883e" rx="6" opacity="0.12"/>
  <text x="45" y="403" fill="#f0883e" font-size="12" font-weight="bold">[Stage 2/5: Evidence]</text>
  <rect x="280" y="397" width="100" height="5" fill="#30363d" rx="3"/>
  <rect x="280" y="397" width="40" height="5" fill="#f0883e" rx="3"/>

  <rect x="30" y="425" width="740" height="155" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="448" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="452" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="452" fill="#e6edf3" font-size="13">You chose B. Good — "3 years deep + AI leverage." Now evidence.</text>
  <text x="75" y="478" fill="#c9d1d9" font-size="12">You said "AI can already do what takes experts years."</text>
  <text x="75" y="498" fill="#c9d1d9" font-size="12">Can you name one specific task where this is true?</text>

  <rect x="75" y="518" width="680" height="24" fill="#462c16" rx="4" stroke="#f0883e" stroke-width="1" opacity="0.6"/>
  <text x="90" y="534" fill="#f0883e" font-size="11">Bias flagged: Availability heuristic — vivid AI demos =/= general capability</text>

  <text x="75" y="565" fill="#8b949e" font-size="11" font-style="italic">REQUIRED: Name one domain where deep expertise still beats AI. No skipping.</text>

  <!-- ════ Stage 3: Bridge ════ -->
  <rect x="30" y="600" width="740" height="28" fill="#1c2128" rx="6"/>
  <rect x="30" y="600" width="444" height="28" fill="#a78bfa" rx="6" opacity="0.1"/>
  <text x="45" y="618" fill="#a78bfa" font-size="12" font-weight="bold">[Stage 3/5: Inference Bridge]</text>
  <rect x="280" y="612" width="100" height="5" fill="#30363d" rx="3"/>
  <rect x="280" y="612" width="60" height="5" fill="#a78bfa" rx="3"/>

  <rect x="30" y="640" width="740" height="140" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="663" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="667" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="667" fill="#e6edf3" font-size="13">Your evidence: AI handles 80% of routine radiology reads.</text>
  <text x="75" y="687" fill="#e6edf3" font-size="13">Your conclusion: 3yr depth + AI is the optimal strategy.</text>
  <text x="75" y="713" fill="#2ec4b6" font-size="13" font-weight="bold">But WHY does "AI handles routine tasks" mean</text>
  <text x="75" y="733" fill="#2ec4b6" font-size="13" font-weight="bold">"3 years is the right depth"? What's the cutoff logic?</text>
  <text x="75" y="765" fill="#8b949e" font-size="11">Try: "If [AI handles X% of a field], then [Y years] is enough because ______"</text>

  <!-- ════ Stage 4: Stress Test ════ -->
  <rect x="30" y="800" width="740" height="28" fill="#1c2128" rx="6"/>
  <rect x="30" y="800" width="592" height="28" fill="#f47067" rx="6" opacity="0.1"/>
  <text x="45" y="818" fill="#f47067" font-size="12" font-weight="bold">[Stage 4/5: Stress Test]</text>
  <rect x="280" y="812" width="100" height="5" fill="#30363d" rx="3"/>
  <rect x="280" y="812" width="80" height="5" fill="#f47067" rx="3"/>

  <rect x="30" y="840" width="740" height="160" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="863" r="10" fill="#a78bfa" opacity="0.2"/>
  <text x="55" y="867" fill="#a78bfa" font-size="11" text-anchor="middle">C</text>

  <text x="75" y="867" fill="#f47067" font-size="13" font-weight="bold">Pre-mortem time.</text>
  <text x="75" y="893" fill="#e6edf3" font-size="13">It's 2030. You followed the "3yr + AI" strategy and it failed.</text>
  <text x="75" y="913" fill="#e6edf3" font-size="13">What went wrong? Give me the top 3 failure causes.</text>

  <text x="75" y="945" fill="#e6edf3" font-size="13">Your confidence: 75%</text>
  <rect x="75" y="955" width="300" height="7" fill="#30363d" rx="4"/>
  <rect x="75" y="955" width="225" height="7" fill="url(#teal)" rx="4"/>
  <text x="385" y="963" fill="#8b949e" font-size="10">75%</text>

  <text x="75" y="988" fill="#8b949e" font-size="11" font-style="italic">"Resulting" trap: a strategy can be correct even if the outcome is bad.</text>

  <!-- ════ Stage 5: Summary ════ -->
  <rect x="30" y="1020" width="740" height="28" fill="#1c2128" rx="6"/>
  <rect x="30" y="1020" width="740" height="28" fill="#7ee787" rx="6" opacity="0.08"/>
  <text x="45" y="1038" fill="#7ee787" font-size="12" font-weight="bold">[Stage 5/5: Summary]</text>
  <rect x="280" y="1032" width="100" height="5" fill="#7ee787" rx="3"/>

  <rect x="30" y="1060" width="740" height="400" fill="#1c2128" rx="8" stroke="#30363d" stroke-width="1"/>

  <text x="50" y="1090" fill="#e6edf3" font-size="14" font-weight="bold">Think-Through Summary</text>
  <line x1="50" y1="1100" x2="750" y2="1100" stroke="#30363d" stroke-width="1"/>

  <text x="50" y="1125" fill="#2ec4b6" font-size="12" font-weight="bold">Claim</text>
  <text x="50" y="1143" fill="#c9d1d9" font-size="12">In the AI era, 3yr focused depth + AI fluency beats both</text>
  <text x="50" y="1160" fill="#c9d1d9" font-size="12">pure generalism and 10yr hyper-specialization.</text>

  <text x="50" y="1188" fill="#f0883e" font-size="12" font-weight="bold">Data</text>
  <text x="50" y="1206" fill="#c9d1d9" font-size="12">AI automates 80% of routine radiology; senior doctors still</text>
  <text x="50" y="1223" fill="#c9d1d9" font-size="12">needed for ambiguous cases; similar patterns in law, finance</text>

  <text x="50" y="1251" fill="#a78bfa" font-size="12" font-weight="bold">Warrant</text>
  <text x="50" y="1269" fill="#c9d1d9" font-size="12">When AI handles the commodity layer, human value concentrates</text>
  <text x="50" y="1286" fill="#c9d1d9" font-size="12">at the judgment layer — reachable in ~3yr if AI-augmented</text>

  <text x="50" y="1314" fill="#f47067" font-size="12" font-weight="bold">Rebuttal</text>
  <text x="50" y="1332" fill="#c9d1d9" font-size="12">Fails if: AI jumps to the judgment layer faster than expected;</text>
  <text x="50" y="1349" fill="#c9d1d9" font-size="12">"3yr" is field-dependent; credentialing gatekeeps regardless</text>

  <text x="50" y="1377" fill="#7ee787" font-size="12" font-weight="bold">Qualifier</text>
  <text x="50" y="1395" fill="#c9d1d9" font-size="12">Likely holds for knowledge work IF your field has a clear</text>
  <text x="50" y="1412" fill="#c9d1d9" font-size="12">"routine vs. judgment" split and you actively use AI tools</text>

  <line x1="50" y1="1430" x2="750" y2="1430" stroke="#30363d" stroke-width="1"/>

  <text x="50" y="1448" fill="#8b949e" font-size="12" font-weight="bold">Biases Detected</text>
  <rect x="175" y="1435" width="140" height="22" fill="#462c16" rx="4"/>
  <text x="185" y="1450" fill="#f0883e" font-size="10">Availability Heuristic</text>
  <rect x="325" y="1435" width="120" height="22" fill="#2a1c3e" rx="4"/>
  <text x="335" y="1450" fill="#a78bfa" font-size="10">Optimism Bias</text>

  <!-- Cursor -->
  <text x="30" y="1500" fill="#7ee787" font-weight="bold">$</text>
  <text x="50" y="1500" fill="#484f58">
    <animate attributeName="fill" values="#484f58;#e6edf3;#484f58" dur="1.2s" repeatCount="indefinite"/>|
  </text>
</svg>
