<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" font-family="'SF Mono', 'Menlo', monospace">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#sbg)" rx="12"/>

  <!-- Stage 1 -->
  <g>
    <rect x="20" y="30" width="130" height="90" fill="#1c2128" rx="10" stroke="#2ec4b6" stroke-width="2"/>
    <text x="85" y="58" fill="#2ec4b6" font-size="22" text-anchor="middle">1</text>
    <text x="85" y="78" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Anchoring</text>
    <text x="85" y="95" fill="#8b949e" font-size="9" text-anchor="middle">Define the</text>
    <text x="85" y="108" fill="#8b949e" font-size="9" text-anchor="middle">real question</text>
  </g>

  <!-- Arrow 1->2 -->
  <g>
    <line x1="150" y1="75" x2="170" y2="75" stroke="#30363d" stroke-width="2"/>
    <polygon points="170,70 180,75 170,80" fill="#30363d"/>
    <text x="165" y="65" fill="#484f58" font-size="8">Clarity</text>
  </g>

  <!-- Stage 2 -->
  <g>
    <rect x="180" y="30" width="130" height="90" fill="#1c2128" rx="10" stroke="#f0883e" stroke-width="2"/>
    <text x="245" y="58" fill="#f0883e" font-size="22" text-anchor="middle">2</text>
    <text x="245" y="78" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Evidence</text>
    <text x="245" y="95" fill="#8b949e" font-size="9" text-anchor="middle">Verify facts,</text>
    <text x="245" y="108" fill="#8b949e" font-size="9" text-anchor="middle">find counter</text>
  </g>

  <!-- Arrow 2->3 -->
  <g>
    <line x1="310" y1="75" x2="330" y2="75" stroke="#30363d" stroke-width="2"/>
    <polygon points="330,70 340,75 330,80" fill="#30363d"/>
    <text x="325" y="65" fill="#484f58" font-size="8">Accuracy</text>
  </g>

  <!-- Stage 3 -->
  <g>
    <rect x="340" y="30" width="130" height="90" fill="#1c2128" rx="10" stroke="#a78bfa" stroke-width="2"/>
    <text x="405" y="58" fill="#a78bfa" font-size="22" text-anchor="middle">3</text>
    <text x="405" y="78" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Bridge</text>
    <text x="405" y="95" fill="#8b949e" font-size="9" text-anchor="middle">Why evidence</text>
    <text x="405" y="108" fill="#8b949e" font-size="9" text-anchor="middle">supports claim</text>
  </g>

  <!-- Arrow 3->4 -->
  <g>
    <line x1="470" y1="75" x2="490" y2="75" stroke="#30363d" stroke-width="2"/>
    <polygon points="490,70 500,75 490,80" fill="#30363d"/>
    <text x="485" y="65" fill="#484f58" font-size="8">Logic</text>
  </g>

  <!-- Stage 4 -->
  <g>
    <rect x="500" y="30" width="130" height="90" fill="#1c2128" rx="10" stroke="#f47067" stroke-width="2"/>
    <text x="565" y="58" fill="#f47067" font-size="22" text-anchor="middle">4</text>
    <text x="565" y="78" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Stress Test</text>
    <text x="565" y="95" fill="#8b949e" font-size="9" text-anchor="middle">Pre-mortem,</text>
    <text x="565" y="108" fill="#8b949e" font-size="9" text-anchor="middle">find rebuttals</text>
  </g>

  <!-- Arrow 4->5 -->
  <g>
    <line x1="630" y1="75" x2="650" y2="75" stroke="#30363d" stroke-width="2"/>
    <polygon points="650,70 660,75 650,80" fill="#30363d"/>
    <text x="645" y="65" fill="#484f58" font-size="8">Fairness</text>
  </g>

  <!-- Stage 5 -->
  <g>
    <rect x="660" y="30" width="120" height="90" fill="#1c2128" rx="10" stroke="#7ee787" stroke-width="2"/>
    <text x="720" y="58" fill="#7ee787" font-size="22" text-anchor="middle">5</text>
    <text x="720" y="78" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Summary</text>
    <text x="720" y="95" fill="#8b949e" font-size="9" text-anchor="middle">Toulmin map</text>
    <text x="720" y="108" fill="#8b949e" font-size="9" text-anchor="middle">+ insights</text>
  </g>

  <!-- Quality Gates label -->
  <text x="400" y="155" fill="#484f58" font-size="10" text-anchor="middle" letter-spacing="2">INTELLECTUAL STANDARDS AS QUALITY GATES</text>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="400" y="175" fill="#2ec4b6" font-size="10" text-anchor="middle">Each stage must pass its gate before advancing</text>
</svg>
