<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'SF Mono', 'Menlo', monospace">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5"/>
      <stop offset="100%" style="stop-color:#f5f0eb"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#lbg)" rx="12"/>

  <!-- Header -->
  <text x="30" y="32" fill="#2ec4b6" font-size="16" font-weight="bold" font-family="'Georgia', serif" font-style="italic">Lucidly</text>
  <rect x="85" y="20" width="35" height="16" fill="#2ec4b6" rx="3" opacity="0.15"/>
  <text x="92" y="32" fill="#2ec4b6" font-size="9">BETA</text>

  <!-- Section label -->
  <text x="400" y="30" fill="#8b949e" font-size="10" text-anchor="middle" letter-spacing="2">ARGUMENT STRUCTURE</text>

  <!-- ═══ Toulmin Cards ═══ -->

  <!-- DATA column -->
  <rect x="30" y="55" width="210" height="200" fill="#ffffff" rx="10" stroke="#e8e0d8" stroke-width="1"/>
  <rect x="30" y="55" width="210" height="30" fill="#f0883e" rx="10" opacity="0.08"/>
  <rect x="30" y="75" width="210" height="10" fill="#ffffff"/>
  <text x="45" y="74" fill="#f0883e" font-size="10" font-weight="bold" letter-spacing="1">DATA (3)</text>
  <text x="215" y="74" fill="#f0883e" font-size="10">&#9650;</text>

  <text x="45" y="105" fill="#3d3d3d" font-size="11">APAC ECM experience</text>
  <text x="45" y="120" fill="#3d3d3d" font-size="11">doesn't match UK market</text>
  <text x="45" y="135" fill="#3d3d3d" font-size="11">structure</text>
  <text x="45" y="152" fill="#2ec4b6" font-size="10">&#9679;&#9679;&#9679;</text>

  <line x1="45" y1="162" x2="225" y2="162" stroke="#e8e0d8" stroke-width="0.5"/>

  <text x="45" y="182" fill="#3d3d3d" font-size="11">Only 1 perfect-fit</text>
  <text x="45" y="197" fill="#3d3d3d" font-size="11">opportunity (HKEX) in</text>
  <text x="45" y="212" fill="#3d3d3d" font-size="11">the past year</text>
  <text x="45" y="229" fill="#2ec4b6" font-size="10">&#9679;&#9679;&#9679;</text>

  <!-- WARRANT column -->
  <rect x="295" y="55" width="210" height="200" fill="#ffffff" rx="10" stroke="#e8e0d8" stroke-width="1"/>
  <rect x="295" y="55" width="210" height="30" fill="#1a1a2e" rx="10" opacity="0.06"/>
  <rect x="295" y="75" width="210" height="10" fill="#ffffff"/>
  <text x="310" y="74" fill="#1a1a2e" font-size="10" font-weight="bold" letter-spacing="1">WARRANT (2)</text>
  <text x="480" y="74" fill="#1a1a2e" font-size="10">&#9650;</text>

  <text x="310" y="105" fill="#3d3d3d" font-size="11">The real goal isn't just</text>
  <text x="310" y="120" fill="#3d3d3d" font-size="11">finding work — it's</text>
  <text x="310" y="135" fill="#3d3d3d" font-size="11">rebuilding identity and</text>
  <text x="310" y="150" fill="#3d3d3d" font-size="11">sense of value</text>
  <text x="310" y="167" fill="#2ec4b6" font-size="10">&#9679;&#9679;&#9679;</text>

  <line x1="310" y1="177" x2="490" y2="177" stroke="#e8e0d8" stroke-width="0.5"/>

  <text x="310" y="197" fill="#3d3d3d" font-size="11">Lack of M&amp;A experience</text>
  <text x="310" y="212" fill="#3d3d3d" font-size="11">is the core blocker</text>
  <text x="310" y="229" fill="#2ec4b6" font-size="10">&#9679;&#9679;&#9679;</text>

  <!-- Arrow: Data -> Warrant -->
  <line x1="240" y1="155" x2="295" y2="155" stroke="#c9d1d9" stroke-width="1.5" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- CLAIM column -->
  <rect x="560" y="55" width="210" height="130" fill="#ffffff" rx="10" stroke="#2ec4b6" stroke-width="2"/>
  <rect x="560" y="55" width="210" height="30" fill="#2ec4b6" rx="10" opacity="0.08"/>
  <rect x="560" y="75" width="210" height="10" fill="#ffffff"/>
  <text x="575" y="74" fill="#d94040" font-size="10" font-weight="bold" letter-spacing="1">CLAIM (1)</text>
  <text x="745" y="74" fill="#d94040" font-size="10">&#9650;</text>

  <text x="575" y="105" fill="#3d3d3d" font-size="11">Should continue job</text>
  <text x="575" y="120" fill="#3d3d3d" font-size="11">search in UK with a</text>
  <text x="575" y="135" fill="#3d3d3d" font-size="11">more realistic, mixed</text>
  <text x="575" y="150" fill="#3d3d3d" font-size="11">strategy</text>
  <text x="575" y="167" fill="#2ec4b6" font-size="10">&#9679;&#9679;&#9675;</text>

  <!-- Arrow: Warrant -> Claim -->
  <line x1="505" y1="120" x2="560" y2="120" stroke="#c9d1d9" stroke-width="1.5" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom row: Qualifier, Backing, Rebuttal -->
  <rect x="30" y="275" width="230" height="36" fill="#ffffff" rx="8" stroke="#2ec4b6" stroke-width="1"/>
  <text x="45" y="298" fill="#2ec4b6" font-size="10" font-weight="bold">QUALIFIER (1)</text>
  <text x="235" y="298" fill="#2ec4b6" font-size="10">&#9660;</text>

  <rect x="280" y="275" width="230" height="36" fill="#ffffff" rx="8" stroke="#7ee787" stroke-width="1"/>
  <text x="295" y="298" fill="#56a85c" font-size="10" font-weight="bold">BACKING (2)</text>
  <text x="485" y="298" fill="#56a85c" font-size="10">&#9660;</text>

  <rect x="530" y="275" width="240" height="36" fill="#ffffff" rx="8" stroke="#f47067" stroke-width="1"/>
  <text x="545" y="298" fill="#d94040" font-size="10" font-weight="bold">REBUTTAL (2)</text>
  <text x="745" y="298" fill="#d94040" font-size="10">&#9660;</text>

  <!-- ═══ Reasoning Dialog preview ═══ -->
  <line x1="30" y1="330" x2="770" y2="330" stroke="#e8e0d8" stroke-width="0.5"/>
  <text x="30" y="352" fill="#8b949e" font-size="10" letter-spacing="2">REASONING DIALOG [28 MESSAGES]</text>

  <rect x="30" y="365" width="740" height="48" fill="#ffffff" rx="8" stroke="#e8e0d8" stroke-width="1"/>
  <text x="50" y="386" fill="#3d3d3d" font-size="12" font-weight="bold" font-family="'Georgia', serif">Wait — what does "keep going" actually mean?</text>
  <text x="50" y="403" fill="#8b949e" font-size="10" font-style="italic">Need clearer definition of what persistence means here</text>

  <rect x="60" y="425" width="710" height="42" fill="#f8f6f3" rx="8" stroke="#2ec4b6" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="80" y="443" fill="#5a5a5a" font-size="11">I worked in APAC investment banking for 8 years, my skillset is</text>
  <text x="80" y="458" fill="#5a5a5a" font-size="11">quite niche. When applying in the UK, I'm not the typical...</text>
</svg>
