<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="1080" height="1440" fill="#f8f8fc"/>
  <circle cx="540" cy="400" r="350" fill="#0d9488" opacity="0.04" filter="url(#blur1)"/>

  <!-- Title -->
  <text x="540" y="110" fill="#8888a0" font-size="20" text-anchor="middle" letter-spacing="3" font-weight="500">AI 时代的真相</text>
  <text x="540" y="175" fill="#1a1a2e" font-size="46" font-weight="700" text-anchor="middle">AI 能做的 vs 你得自己来的</text>

  <!-- Table header -->
  <rect x="80" y="240" width="440" height="65" rx="12" fill="#f0f0f4"/>
  <rect x="560" y="240" width="440" height="65" rx="12" fill="#0d9488" opacity="0.1"/>
  <rect x="560" y="240" width="440" height="65" rx="12" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.4"/>

  <text x="300" y="282" fill="#777790" font-size="22" font-weight="600" text-anchor="middle">AI 擅长的</text>
  <text x="780" y="282" fill="#0d9488" font-size="22" font-weight="600" text-anchor="middle">AI 替代不了的</text>

  <!-- Row 1 -->
  <rect x="80" y="330" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="560" y="330" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <text x="115" y="380" fill="#8888a0" font-size="32">🤖</text>
  <text x="160" y="382" fill="#444455" font-size="24" font-weight="500">生成答案</text>
  <text x="160" y="416" fill="#8888a0" font-size="17">你问什么它都能回答</text>
  <text x="595" y="380" fill="#f0c040" font-size="32">🧠</text>
  <text x="640" y="382" fill="#1a1a2e" font-size="24" font-weight="600">知道该问什么问题</text>
  <text x="640" y="416" fill="#777790" font-size="17">好问题比好答案值钱 100 倍</text>

  <!-- Row 2 -->
  <rect x="80" y="465" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="560" y="465" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <text x="115" y="515" fill="#8888a0" font-size="32">🤖</text>
  <text x="160" y="517" fill="#444455" font-size="24" font-weight="500">总结证据</text>
  <text x="160" y="551" fill="#8888a0" font-size="17">一秒钟整理几十篇文章</text>
  <text x="595" y="515" fill="#f0c040" font-size="32">🧠</text>
  <text x="640" y="517" fill="#1a1a2e" font-size="24" font-weight="600">判断证据是否可信</text>
  <text x="640" y="551" fill="#777790" font-size="17">数据来源、样本量、利益冲突</text>

  <!-- Row 3 -->
  <rect x="80" y="600" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="560" y="600" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <text x="115" y="650" fill="#8888a0" font-size="32">🤖</text>
  <text x="160" y="652" fill="#444455" font-size="24" font-weight="500">构造论点</text>
  <text x="160" y="686" fill="#8888a0" font-size="17">正反面都说得头头是道</text>
  <text x="595" y="650" fill="#f0c040" font-size="32">🧠</text>
  <text x="640" y="652" fill="#1a1a2e" font-size="24" font-weight="600">发现自己的盲区</text>
  <text x="640" y="686" fill="#777790" font-size="17">你不知道你不知道的东西</text>

  <!-- Row 4 -->
  <rect x="80" y="735" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="560" y="735" width="440" height="110" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <text x="115" y="785" fill="#8888a0" font-size="32">🤖</text>
  <text x="160" y="787" fill="#444455" font-size="24" font-weight="500">优化方案</text>
  <text x="160" y="821" fill="#8888a0" font-size="17">给什么目标就往什么方向优化</text>
  <text x="595" y="785" fill="#f0c040" font-size="32">🧠</text>
  <text x="640" y="787" fill="#1a1a2e" font-size="24" font-weight="600">质疑目标本身是否正确</text>
  <text x="640" y="821" fill="#777790" font-size="17">方向错了，跑得越快偏得越远</text>

  <!-- Divider -->
  <line x1="100" y1="920" x2="980" y2="920" stroke="#e4e4ec" stroke-width="1"/>

  <!-- Bottom insight -->
  <text x="540" y="1000" fill="#8888a0" font-size="20" text-anchor="middle" letter-spacing="3" font-weight="500">WEF 2025 未来就业报告</text>

  <text x="540" y="1075" fill="#1a1a2e" font-size="42" font-weight="700" text-anchor="middle">批判性思维</text>
  <text x="540" y="1130" fill="#555568" font-size="26" text-anchor="middle">连续两年被评为全球第一紧缺技能</text>

  <!-- Visual accent: #1 -->
  <text x="540" y="1300" fill="#0d9488" font-size="130" font-weight="800" text-anchor="middle" opacity="0.06" font-family="'SF Mono', monospace">#1</text>
  <text x="540" y="1300" fill="#0d9488" font-size="80" font-weight="800" text-anchor="middle" opacity="0.12" font-family="'SF Mono', monospace">#1</text>

  <!-- Bottom bar -->
  <rect x="0" y="1380" width="1080" height="60" fill="#f0f0f4"/>
  <text x="540" y="1418" fill="#8888a0" font-size="16" text-anchor="middle" letter-spacing="1">来源：World Economic Forum Future of Jobs Report 2025</text>
</svg>
