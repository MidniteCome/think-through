<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Mono', 'Menlo', monospace">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#tbg)" rx="12"/>

  <text x="400" y="35" fill="#8b949e" font-size="13" text-anchor="middle" letter-spacing="3">TOULMIN ARGUMENT STRUCTURE</text>

  <!-- Data box -->
  <rect x="40" y="140" width="160" height="70" fill="#1c2128" rx="8" stroke="#f0883e" stroke-width="1.5"/>
  <text x="120" y="170" fill="#f0883e" font-size="12" text-anchor="middle" font-weight="bold">DATA</text>
  <text x="120" y="190" fill="#8b949e" font-size="10" text-anchor="middle">Evidence / Facts</text>

  <!-- Arrow: Data -> Claim -->
  <line x1="200" y1="175" x2="310" y2="175" stroke="#30363d" stroke-width="2" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="310,170 320,175 310,180" fill="#30363d"/>

  <!-- Warrant box (below arrow) -->
  <rect x="220" y="240" width="160" height="70" fill="#1c2128" rx="8" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="300" y="270" fill="#a78bfa" font-size="12" text-anchor="middle" font-weight="bold">WARRANT</text>
  <text x="300" y="290" fill="#8b949e" font-size="10" text-anchor="middle">Why D supports C</text>

  <!-- Arrow: Warrant -> connection -->
  <line x1="300" y1="240" x2="260" y2="185" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Backing box (below warrant) -->
  <rect x="220" y="330" width="160" height="55" fill="#1c2128" rx="8" stroke="#7ee787" stroke-width="1"/>
  <text x="300" y="355" fill="#7ee787" font-size="11" text-anchor="middle" font-weight="bold">BACKING</text>
  <text x="300" y="372" fill="#8b949e" font-size="9" text-anchor="middle">Warrant credibility</text>

  <!-- Arrow: Backing -> Warrant -->
  <line x1="300" y1="330" x2="300" y2="310" stroke="#7ee787" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Qualifier box -->
  <rect x="420" y="70" width="160" height="60" fill="#1c2128" rx="8" stroke="#2ec4b6" stroke-width="1.5"/>
  <text x="500" y="95" fill="#2ec4b6" font-size="12" text-anchor="middle" font-weight="bold">QUALIFIER</text>
  <text x="500" y="112" fill="#8b949e" font-size="10" text-anchor="middle">Probably, unless...</text>

  <!-- Arrow: Qualifier -> Claim -->
  <line x1="500" y1="130" x2="500" y2="148" stroke="#2ec4b6" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Claim box (center right, emphasized) -->
  <rect x="420" y="140" width="160" height="70" fill="#1c2128" rx="8" stroke="#2ec4b6" stroke-width="2" filter="url(#glow)"/>
  <text x="500" y="170" fill="#2ec4b6" font-size="13" text-anchor="middle" font-weight="bold">CLAIM</text>
  <text x="500" y="190" fill="#8b949e" font-size="10" text-anchor="middle">Conclusion</text>

  <!-- Rebuttal box -->
  <rect x="610" y="140" width="160" height="70" fill="#1c2128" rx="8" stroke="#f47067" stroke-width="1.5"/>
  <text x="690" y="170" fill="#f47067" font-size="12" text-anchor="middle" font-weight="bold">REBUTTAL</text>
  <text x="690" y="190" fill="#8b949e" font-size="10" text-anchor="middle">Unless / Except if</text>

  <!-- Arrow: Rebuttal -> Claim -->
  <line x1="610" y1="175" x2="585" y2="175" stroke="#f47067" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Flow labels -->
  <text x="255" y="168" fill="#484f58" font-size="9">so</text>
  <text x="255" y="230" fill="#484f58" font-size="9">since</text>
  <text x="595" y="168" fill="#484f58" font-size="9">unless</text>
</svg>
