<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1080" height="1440" fill="#f8f8fc"/>
  <circle cx="540" cy="720" r="400" fill="#0d9488" opacity="0.04" filter="url(#blur1)"/>

  <!-- Title -->
  <text x="540" y="100" fill="#8888a0" font-size="20" text-anchor="middle" letter-spacing="3" font-weight="500">不是套壳 PROMPT</text>
  <text x="540" y="165" fill="#1a1a2e" font-size="44" font-weight="700" text-anchor="middle">5 阶段推理状态机</text>
  <text x="540" y="215" fill="#777790" font-size="22" text-anchor="middle">每阶段有质量门控，不过关就不能往下走</text>

  <!-- Stage 1 -->
  <rect x="80" y="280" width="920" height="140" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="80" y="280" width="6" height="140" rx="3" fill="#f0c040"/>
  <text x="128" y="325" fill="#c49000" font-size="16" font-weight="700" letter-spacing="2" font-family="'SF Mono', monospace">STAGE 1</text>
  <text x="260" y="326" fill="#1a1a2e" font-size="28" font-weight="700">锚定</text>
  <text x="128" y="365" fill="#444455" font-size="20">把模糊的感觉变成具体可操作的问题</text>
  <text x="128" y="400" fill="#8888a0" font-size="16">门控：清晰度 · 技术：费米分解</text>

  <!-- Arrow 1→2 -->
  <text x="540" y="448" fill="#0d9488" font-size="26" text-anchor="middle" opacity="0.4">▼</text>

  <!-- Stage 2 -->
  <rect x="80" y="468" width="920" height="140" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="80" y="468" width="6" height="140" rx="3" fill="#3b82f6"/>
  <text x="128" y="513" fill="#3b82f6" font-size="16" font-weight="700" letter-spacing="2" font-family="'SF Mono', monospace">STAGE 2</text>
  <text x="260" y="514" fill="#1a1a2e" font-size="28" font-weight="700">证据检验</text>
  <text x="128" y="553" fill="#444455" font-size="20">收集证据，然后强制你找反面证据</text>
  <text x="128" y="588" fill="#8888a0" font-size="16">门控：准确度 + 广度 · 技术：反 WYSIATI</text>

  <!-- Arrow 2→3 -->
  <text x="540" y="636" fill="#0d9488" font-size="26" text-anchor="middle" opacity="0.4">▼</text>

  <!-- Stage 3 — highlighted -->
  <rect x="80" y="656" width="920" height="160" rx="12" fill="#f0fffe" stroke="#0d9488" stroke-width="2"/>
  <rect x="80" y="656" width="6" height="160" rx="3" fill="#0d9488"/>
  <text x="128" y="701" fill="#0d9488" font-size="16" font-weight="700" letter-spacing="2" font-family="'SF Mono', monospace">STAGE 3</text>
  <text x="260" y="702" fill="#1a1a2e" font-size="28" font-weight="700">推理桥梁</text>
  <rect x="400" y="685" width="60" height="26" rx="5" fill="#0d9488" opacity="0.12"/>
  <text x="430" y="703" fill="#0d9488" font-size="14" font-weight="600" text-anchor="middle">核心</text>
  <text x="128" y="745" fill="#444455" font-size="20">追问：凭什么你的证据能推出你的结论？</text>
  <text x="128" y="778" fill="#777790" font-size="17" font-style="italic">大多数人直接从证据跳到结论，跳过了这一步</text>
  <text x="128" y="803" fill="#8888a0" font-size="16">门控：逻辑性 · 技术：Warrant 提取</text>

  <!-- Arrow 3→4 -->
  <text x="540" y="848" fill="#0d9488" font-size="26" text-anchor="middle" opacity="0.4">▼</text>

  <!-- Stage 4 -->
  <rect x="80" y="868" width="920" height="140" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="80" y="868" width="6" height="140" rx="3" fill="#f97316"/>
  <text x="128" y="913" fill="#f97316" font-size="16" font-weight="700" letter-spacing="2" font-family="'SF Mono', monospace">STAGE 4</text>
  <text x="260" y="914" fill="#1a1a2e" font-size="28" font-weight="700">压力测试</text>
  <text x="128" y="953" fill="#444455" font-size="20">找到你的结论会崩的场景</text>
  <text x="128" y="988" fill="#8888a0" font-size="16">门控：公正性 + 深度 · 技术：事前验尸 + 置信度校准</text>

  <!-- Arrow 4→5 -->
  <text x="540" y="1036" fill="#0d9488" font-size="26" text-anchor="middle" opacity="0.4">▼</text>

  <!-- Stage 5 -->
  <rect x="80" y="1056" width="920" height="140" rx="12" fill="#ffffff" stroke="#e4e4ec" stroke-width="1"/>
  <rect x="80" y="1056" width="6" height="140" rx="3" fill="#8b5cf6"/>
  <text x="128" y="1101" fill="#8b5cf6" font-size="16" font-weight="700" letter-spacing="2" font-family="'SF Mono', monospace">STAGE 5</text>
  <text x="260" y="1102" fill="#1a1a2e" font-size="28" font-weight="700">总结</text>
  <text x="128" y="1141" fill="#444455" font-size="20">输出完整 Toulmin 论证图 + 偏见报告</text>
  <text x="128" y="1176" fill="#8888a0" font-size="16">数据 → 保证 → 主张 → 限定 → 反驳</text>

  <!-- Bottom insight -->
  <line x1="100" y1="1260" x2="980" y2="1260" stroke="#e4e4ec" stroke-width="1"/>

  <text x="540" y="1320" fill="#777790" font-size="22" text-anchor="middle">
    <tspan fill="#1a1a2e" font-weight="600">最终产出不是更好的答案，</tspan>
    <tspan fill="#0d9488" font-weight="600">是更好的问题。</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="1380" width="1080" height="60" fill="#f0f0f4"/>
  <text x="540" y="1418" fill="#8888a0" font-size="16" text-anchor="middle" letter-spacing="1">基于 Toulmin · Paul-Elder · Kahneman · Tetlock</text>
</svg>
