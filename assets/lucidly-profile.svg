<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'SF Mono', 'Menlo', monospace">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5"/>
      <stop offset="100%" style="stop-color:#f5f0eb"/>
    </linearGradient>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#pbg)" rx="12"/>

  <!-- Header -->
  <text x="30" y="32" fill="#2ec4b6" font-size="16" font-weight="bold" font-family="'Georgia', serif" font-style="italic">Lucidly</text>
  <text x="400" y="30" fill="#8b949e" font-size="10" text-anchor="middle" letter-spacing="2">THINKING PROFILE</text>

  <!-- ═══ Left: Thinking Type + Insights ═══ -->

  <!-- Thinking Type Card -->
  <rect x="30" y="50" width="350" height="170" fill="#ffffff" rx="12" stroke="#e8e0d8" stroke-width="1"/>
  <rect x="30" y="50" width="350" height="170" fill="url(#wgrad)" rx="12" opacity="0.3"/>

  <text x="205" y="85" fill="#2ec4b6" font-size="36" font-weight="bold" text-anchor="middle" letter-spacing="8">ATBG</text>
  <text x="205" y="108" fill="#3d3d3d" font-size="14" text-anchor="middle" font-weight="bold" font-family="'Georgia', serif" font-style="italic">The Specialist</text>
  <text x="205" y="130" fill="#6b6b6b" font-size="11" text-anchor="middle">Deep and disciplined in analysis with a strong</text>
  <text x="205" y="146" fill="#6b6b6b" font-size="11" text-anchor="middle">growth trajectory. Broadening your awareness</text>
  <text x="205" y="162" fill="#6b6b6b" font-size="11" text-anchor="middle">of hidden biases will sharpen your edge.</text>

  <rect x="160" y="175" width="90" height="28" fill="#ffffff" rx="6" stroke="#2ec4b6" stroke-width="1"/>
  <text x="205" y="194" fill="#2ec4b6" font-size="11" text-anchor="middle">Share</text>

  <!-- Quality Score Trend -->
  <rect x="30" y="235" width="350" height="90" fill="#ffffff" rx="10" stroke="#e8e0d8" stroke-width="1"/>
  <text x="50" y="260" fill="#3d3d3d" font-size="12" font-weight="bold">Quality Score Trend</text>
  <text x="340" y="260" fill="#2ec4b6" font-size="12" font-weight="bold">+58%</text>
  <text x="318" y="260" fill="#2ec4b6" font-size="12">&#8593;</text>

  <!-- Sparkline -->
  <polyline points="50,300 90,305 130,295 170,290 210,280 250,270 290,268 330,265" fill="none" stroke="#2ec4b6" stroke-width="2" stroke-linecap="round"/>
  <polygon points="50,300 90,305 130,295 170,290 210,280 250,270 290,268 330,265 330,310 50,310" fill="#2ec4b6" opacity="0.08"/>

  <text x="200" y="296" fill="#3d3d3d" font-size="24" font-weight="bold" text-anchor="middle">67</text>
  <text x="200" y="312" fill="#8b949e" font-size="10" text-anchor="middle">AVG</text>

  <!-- Recent Insights -->
  <rect x="30" y="340" width="350" height="90" fill="#ffffff" rx="10" stroke="#e8e0d8" stroke-width="1"/>
  <text x="50" y="365" fill="#3d3d3d" font-size="12" font-weight="bold">Recent Insights</text>

  <rect x="45" y="378" width="320" height="20" fill="#f0f7f0" rx="4"/>
  <text x="55" y="393" fill="#56a85c" font-size="10">Notice correlation vs causation — your most common trap.</text>

  <rect x="45" y="402" width="320" height="20" fill="#f5f0e6" rx="4"/>
  <text x="55" y="417" fill="#b08a3e" font-size="10">High decision quality — you consider long-term effects.</text>

  <!-- ═══ Right: Bias Radar ═══ -->
  <rect x="420" y="50" width="350" height="280" fill="#ffffff" rx="12" stroke="#e8e0d8" stroke-width="1"/>
  <text x="440" y="78" fill="#3d3d3d" font-size="13" font-weight="bold">Bias Radar</text>

  <!-- Radar chart -->
  <g transform="translate(595, 200)">
    <!-- Guide rings -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#e8e0d8" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="67" fill="none" stroke="#e8e0d8" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#e8e0d8" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#e8e0d8" stroke-width="0.3"/>

    <!-- Axis lines -->
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#e8e0d8" stroke-width="0.3"/>
    <line x1="-78" y1="-45" x2="78" y2="45" stroke="#e8e0d8" stroke-width="0.3"/>
    <line x1="-78" y1="45" x2="78" y2="-45" stroke="#e8e0d8" stroke-width="0.3"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#e8e0d8" stroke-width="0.3"/>

    <!-- Data polygon -->
    <polygon points="0,-72 55,-30 62,30 20,52 -42,40 -60,10 -50,-35 -25,-55"
             fill="#2ec4b6" fill-opacity="0.15" stroke="#2ec4b6" stroke-width="2"/>

    <!-- Data points -->
    <circle cx="0" cy="-72" r="4" fill="#2ec4b6"/>
    <circle cx="55" cy="-30" r="4" fill="#2ec4b6"/>
    <circle cx="62" cy="30" r="4" fill="#2ec4b6"/>
    <circle cx="20" cy="52" r="4" fill="#2ec4b6"/>
    <circle cx="-42" cy="40" r="4" fill="#2ec4b6"/>
    <circle cx="-60" cy="10" r="4" fill="#2ec4b6"/>
    <circle cx="-50" cy="-35" r="4" fill="#2ec4b6"/>
    <circle cx="-25" cy="-55" r="4" fill="#2ec4b6"/>

    <!-- Labels -->
    <text x="0" y="-98" fill="#6b6b6b" font-size="9" text-anchor="middle">Confirmation</text>
    <text x="82" y="-35" fill="#6b6b6b" font-size="9">Anchoring</text>
    <text x="85" y="38" fill="#6b6b6b" font-size="9">Sunk Cost</text>
    <text x="35" y="72" fill="#6b6b6b" font-size="9">Availability</text>
    <text x="-48" y="62" fill="#6b6b6b" font-size="9" text-anchor="end">Bandwagon</text>
    <text x="-80" y="15" fill="#6b6b6b" font-size="9" text-anchor="end">Framing</text>
    <text x="-70" y="-40" fill="#6b6b6b" font-size="9" text-anchor="end">Survivorship</text>
    <text x="-30" y="-68" fill="#6b6b6b" font-size="9" text-anchor="end">Overconf.</text>
  </g>

  <!-- ═══ Wrapped preview ═══ -->
  <rect x="420" y="345" width="350" height="85" fill="#ffffff" rx="12" stroke="#e8e0d8" stroke-width="1"/>
  <rect x="420" y="345" width="350" height="85" rx="12" fill="url(#wgrad)" opacity="0.15"/>

  <text x="440" y="373" fill="#8b949e" font-size="9" letter-spacing="2">YOUR THINKING TYPE</text>
  <text x="440" y="400" fill="#2ec4b6" font-size="28" font-weight="bold" letter-spacing="6">ATBG</text>
  <text x="620" y="395" fill="#3d3d3d" font-size="13" font-family="'Georgia', serif" font-style="italic">The Specialist</text>
  <text x="620" y="413" fill="#8b949e" font-size="10">Swipe for Bias Radar, Growth...</text>

  <!-- Dots -->
  <circle cx="575" cy="425" r="4" fill="#2ec4b6"/>
  <circle cx="588" cy="425" r="3" fill="#c9d1d9"/>
  <circle cx="600" cy="425" r="3" fill="#c9d1d9"/>
  <circle cx="612" cy="425" r="3" fill="#c9d1d9"/>
  <circle cx="624" cy="425" r="3" fill="#c9d1d9"/>
</svg>
